{{define "head"}}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vault Admin</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #101014; color: #e6e6ea; min-height: 100vh;
  }
  a { color: #8ab4ff; text-decoration: none; }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px; border-bottom: 1px solid #23232b;
  }
  header .brand { font-weight: 600; letter-spacing: .2px; }
  header .spacer { flex: 1; }
  header .who { color: #9a9aa5; font-size: 13px; }
  main { max-width: 880px; margin: 0 auto; padding: 32px 24px; }
  h1 { font-size: 20px; margin-bottom: 6px; }
  p.sub { color: #9a9aa5; margin-bottom: 24px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .card {
    background: #17171d; border: 1px solid #23232b; border-radius: 12px;
    padding: 18px;
  }
  .card .num { font-size: 28px; font-weight: 600; }
  .card .label { color: #9a9aa5; font-size: 13px; margin-top: 2px; }
  .card.soon { opacity: .55; }
  button {
    font: inherit; color: #e6e6ea; background: #23232b; border: 1px solid #30303a;
    border-radius: 8px; padding: 6px 14px; cursor: pointer;
  }
  button:hover { background: #2b2b34; }
  .cta {
    display: inline-block; background: #2f5cff; color: #fff; border-radius: 10px;
    padding: 10px 22px; font-weight: 600;
  }
  .center { text-align: center; padding-top: 12vh; }
  .err { color: #ff8a8a; }
</style>
</head>
<body>
{{end}}

{{define "foot"}}
</body>
</html>
{{end}}
