<div class="layout">

      <div class="num">{{.UserCount}}</div>
      <div class="label">Users →</div>

      <div class="num">{{.CatalogTracks}}</div>
      <div class="label">Catalog tracks →</div>

    <div class="card soon">

      <div class="label">Activity &amp; audit (Phase 2)</div>
    </div>
    <div class="card soon">
      <div class="num">—</div>
      <div class="label">System health (Phase 3)</div>
    </div>
  </div>
</main>
</div>
{{template "foot" .}}
