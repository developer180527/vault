# Vault server stack (M1) — see docs/backend/DESIGN.md.
# Only caddy binds host ports (127.0.0.1 only; tailscale serve fronts them).
# Everything else is reachable solely over the compose network by name.

services:
  caddy:
    image: caddy:2
    container_name: vault-caddy
    ports:
      - "127.0.0.1:8080:8080" # member API surface  (tailscale serve 443)
      - "127.0.0.1:8081:8081" # Pocket ID, root     (tailscale serve 9443)
      - "127.0.0.1:8082:8082" # admin surface       (tailscale serve 8443)
      - "127.0.0.1:8083:8083" # Vault admin panel   (tailscale serve 8444)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  vaultd:
    build: ../vaultd
    container_name: vault-vaultd
    # SAME uid:gid as the workers so files it writes into /srv/vault match
    # their output (the staging→library handoff).
    user: "${VAULT_UID}:${VAULT_GID}"
    environment:
      - VAULTD_ADDR=:8080
      - VAULT_DATA_ROOT=/srv/vault
      # Camera-roll backups land on the HDD pool (ZFS dataset mounted here on
      # the host, inside the /srv/vault bind). Default would be the same path
      # anyway — explicit so the storage split is visible in one place.
      - VAULT_PHOTOS_ROOT=/srv/vault/photos
      # Movie/show catalog — big files on the HDD pool (its own ZFS dataset
      # vaultdata/movies, mounted at /srv/vault/movies). ffmpeg/ffprobe are
      # baked into the image (already there for yt-dlp).
      - VAULT_MOVIES_ROOT=/srv/vault/movies
      # OIDC: Pocket ID at its own port. Issuer must match what the client
      # sees. Client id comes from registering vaultd in Pocket ID (see
      # server/vaultd/README + deploy README).
      - VAULTD_OIDC_ISSUER=https://${TS_HOSTNAME}:9443
      - VAULTD_OIDC_CLIENT_ID=${VAULTD_OIDC_CLIENT_ID}
      # Admin panel (docs/backend/ADMIN.md): second listener, admin-only via
      # the Tailscale ACL on port 8444. Remove both lines to disable.
      - VAULTD_ADMIN_ADDR=:8081
      - VAULTD_ADMIN_EXTERNAL_URL=https://${TS_HOSTNAME}:8444
      # Jobs: vaultd drives qBittorrent's Web API over the compose network.
      - VAULTD_QBIT_URL=http://qbittorrent:8090
      - VAULTD_QBIT_USER=admin
      - VAULTD_QBIT_PASSWORD=${QBIT_PASSWORD}
    volumes:
      - /srv/vault:/srv/vault
    depends_on:
      - pocket-id
      - qbittorrent
    restart: unless-stopped

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: vault-pocket-id
    environment:
      # Members reach Pocket ID at its own HTTPS port — root path, never a
      # subpath (IdPs own their root; see DESIGN.md "Routing").
      - APP_URL=https://${TS_HOSTNAME}:9443
      - TRUST_PROXY=true
      - ENCRYPTION_KEY=${POCKET_ID_ENCRYPTION_KEY}
    volumes:
      - pocket-id-data:/app/data
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: vault-qbittorrent
    environment:
      # SAME uid:gid as vaultd (`vault` system user) + group-writable output —
      # DESIGN.md "Ownership & the staging→library handoff".
      - PUID=${VAULT_UID}
      - PGID=${VAULT_GID}
      - UMASK=002
      - TZ=${TZ}
      - WEBUI_PORT=8090
    volumes:
      - qbit-config:/config
      # Staging ONLY — worker containers never see user libraries.
      - /srv/vault/staging/torrents:/srv/vault/staging/torrents
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  pocket-id-data:
  qbit-config:
